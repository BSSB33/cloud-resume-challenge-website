name: Test and Deploy Website

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

env:
  AWS_REGION: eu-west-1
  S3_BUCKET: vitraiaws-cloud-resume-challenge
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
  IK_S3_BUCKET: vitraiaws-ik-website
  IK_CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.IK_CLOUDFRONT_DISTRIBUTION_ID }}
  GALLERY_S3_BUCKET: vitraiaws-photos-backup-thumbnails
  GALLERY_CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.GALLERY_CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install -g html-validate eslint

      - name: Validate HTML
        run: |
          echo "Validating HTML files..."
          npx html-validate "*.html"

      - name: Lint JavaScript
        run: |
          echo "Linting JavaScript files..."
          npx eslint "*.js" --no-eslintrc --env browser,es6 || true

      - name: Check for console.log statements
        run: |
          echo "Checking for console.log statements in production code..."
          if grep -r "console\.log" *.js; then
            echo "Warning: console.log statements found"
          else
            echo "No console.log statements found"
          fi

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync resume site to S3
        run: |
          aws s3 sync . s3://${{ env.S3_BUCKET }} \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "README.md" \
            --exclude ".gitignore" \
            --exclude ".DS_Store" \
            --exclude "ik/*" \
            --exclude "gallery/*" \
            --delete

      - name: Set cache headers for HTML files
        run: |
          aws s3 cp s3://${{ env.S3_BUCKET }}/index.html \
            s3://${{ env.S3_BUCKET }}/index.html \
            --metadata-directive REPLACE \
            --content-type "text/html" \
            --cache-control "max-age=300, must-revalidate"

      - name: Set cache headers for static assets
        run: |
          # CSS files
          aws s3 cp s3://${{ env.S3_BUCKET }}/styles.css \
            s3://${{ env.S3_BUCKET }}/styles.css \
            --metadata-directive REPLACE \
            --content-type "text/css" \
            --cache-control "max-age=604800"

          # JS files
          aws s3 cp s3://${{ env.S3_BUCKET }}/script.js \
            s3://${{ env.S3_BUCKET }}/script.js \
            --metadata-directive REPLACE \
            --content-type "application/javascript" \
            --cache-control "max-age=604800"

          # Image files (1 year cache)
          aws s3 cp s3://${{ env.S3_BUCKET }}/resources/profile_picture.JPG \
            s3://${{ env.S3_BUCKET }}/resources/profile_picture.JPG \
            --metadata-directive REPLACE \
            --content-type "image/jpeg" \
            --cache-control "max-age=31536000"

          aws s3 cp s3://${{ env.S3_BUCKET }}/resources/infrastructure-composer.png \
            s3://${{ env.S3_BUCKET }}/resources/infrastructure-composer.png \
            --metadata-directive REPLACE \
            --content-type "image/png" \
            --cache-control "max-age=31536000"

      - name: Invalidate resume site CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Sync IK website to S3
        run: |
          aws s3 sync ik/ s3://${{ env.IK_S3_BUCKET }}/ \
            --delete \
            --exclude ".htaccess" \
            --exclude ".htpasswd" \
            --exclude "**/.htaccess" \
            --exclude "**/.htpasswd" \
            --exclude ".DS_Store" \
            --exclude "**/.DS_Store"

      - name: Invalidate IK website CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.IK_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Generate gallery manifest
        run: |
          python3 - <<'EOF'
          import json, subprocess, sys
          from datetime import datetime, timezone

          result = subprocess.run(
              ['aws', 's3api', 'list-objects-v2',
               '--bucket', 'vitraiaws-photos-backup-thumbnails',
               '--query', 'Contents[].Key',
               '--output', 'json'],
              capture_output=True, text=True
          )
          if result.returncode != 0:
              print(result.stderr, file=sys.stderr)
              sys.exit(1)

          all_keys = json.loads(result.stdout) or []
          image_exts = {'.jpg', '.jpeg', '.png', '.gif', '.webp', '.avif',
                        '.JPG', '.JPEG', '.PNG'}
          skip_prefixes = {'index.html', 'app.js', 'app.css', 'manifest.json'}

          images = sorted(
              k for k in all_keys
              if any(k.endswith(e) for e in image_exts)
              and k not in skip_prefixes
          )

          manifest = {
              'generated': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
              'files': images
          }
          with open('manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)
          print(f'Manifest: {len(images)} images')
          EOF

      - name: Sync gallery app to S3
        run: |
          aws s3 sync gallery/ s3://${{ env.GALLERY_S3_BUCKET }}/ \
            --exclude ".DS_Store" \
            --exclude "**/.DS_Store"

      - name: Upload gallery manifest
        run: |
          aws s3 cp manifest.json s3://${{ env.GALLERY_S3_BUCKET }}/manifest.json \
            --content-type "application/json" \
            --cache-control "max-age=300, must-revalidate"

      - name: Invalidate gallery CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.GALLERY_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/index.html" "/app.js" "/app.css" "/manifest.json"

      - name: Deployment summary
        run: |
          echo "All sites deployed successfully!"
          echo "Resume: https://resume.vitraigabor.eu"
          echo "IK website: https://ik.vitraigabor.eu"
          echo "Gallery: https://gallery.vitraigabor.eu"
